spring:
  application:
    name: outfit
  datasource:
    url: jdbc:postgresql://localhost:5432/outfit
    username: outfit
    password: outfit
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

outfit:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-chars}
      expiration-minutes: 60

springdoc:
  api-docs:
    path: /docs
